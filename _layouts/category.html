---
layout: default
---

<header>
    <div class="page-heading">
        <h1>{{ page.title }}</h1>
        <span class="subheading">{{ page.description }}</span>
    </div>
</header>

<div class="container">
    <div class="archive-item">
        <div>
            {% for post in site.categories[page.category_name] %}
            <a href="{{ site.baseurl }}{{ post.url }}" class="container">
                <h4>{{post.title}}</h4>
            </a>
            {% endfor %}
            <br>
        </div>
    </div>
</div>
