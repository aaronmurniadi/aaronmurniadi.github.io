<!DOCTYPE html>
<html lang="{{ site.lang or 'en-US' }}">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

  <meta name="description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.github_username }}">
  <meta name="keywords"
    content="{% if page.keywords %}{{ page.keywords }}{% else %}blog, portfolio, programming, philosophy, technology, open source{% endif %}">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{% if page.type %}{{ page.type }}{% else %}website{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="og:description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image"
    content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}/media/images/avatar.jpg{% endif %}">
  <meta property="og:site_name" content="{{ site.title }}">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:site" content="@{{ site.github_username }}">
  <meta property="twitter:creator" content="@{{ site.github_username }}">
  <meta property="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}">
  <meta property="twitter:description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="twitter:image"
    content="{% if page.image %}{{ site.url }}{{ page.image }}{% else %}{{ site.url }}/media/images/avatar.jpg{% endif %}">

  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  {% include "favicon.html" %}

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | url }}">

  {% if site.ga_tracking %}
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.ga_tracking }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', '{{ site.ga_tracking }}');
  </script>
  {% endif %}
</head>

<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <div class="container">
    <nav>
      <a href="{{ '/' | url }}">Home</a>
      <a href="{{ '/posts' | url }}">Posts</a>
      <a href="{{ '/articles' | url }}">Articles</a>
      <a href="{{ '/recaps' | url }}">Recaps</a>
      <a href="{{ '/summaries' | url }}">Summaries</a>
      <a href="{{ '/toolbox' | url }}">Toolbox</a>
      <a href="{{ '/photography' | url }}">Photography</a>
      <a href="{{ '/contact' | url }}">Contact</a>
    </nav>

    <main id="main-content">
      {{ content | safe }}
    </main>
  </div>

  {% if site.mermaid %}
  {% include "components/mermaid.html" %}
  {% endif %}
</body>

</html>
