<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/gallery.css">
    <link rel="stylesheet" href="/css/lightbox.css">
</head>
<body>    
    <header>
        <h1 class="site-title">AARON MURNIADI</h1>
    </header>
    
    <main>
        <div class="content">
            <h1 id="photo-gallery">Photo Gallery</h1>
<p>My photography collection with detailed metadata.</p>
<p>Each photo includes technical specifications and additional information stored in YAML files.</p>
        </div>
        <div class="gallery">
            
            <div class="photo-container">
                <img src="/photos/DSC00125.jpg" alt="DSC00125.jpg" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/1.8", "camera": "SONY NEX-5T", "date": "April 19th, 2025 (11:59)", "focal_length": "25mm", "iso": "2000", "lens": "7ARTISANS 25MM F/1.8", "shutter_speed": "1/80", "tag": "Cat"}'></div>
            </div>
            
            <div class="photo-container">
                <img src="/photos/DSC00094.JPG" alt="DSC00094.JPG" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/1.8", "camera": "SONY NEX-5T", "date": "March 19th, 2025 (17:58)", "focal_length": "25mm", "iso": "3200", "lens": "7ARTISANS 25MM F/1.8", "shutter_speed": "1/80s", "tag": "Cat"}'></div>
            </div>
            
            <div class="photo-container">
                <img src="/photos/DSC00091.JPG" alt="DSC00091.JPG" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/1.8", "camera": "SONY NEX-5T", "date": "March 19th, 2025 (17:05)", "focal_length": "25mm", "iso": "3200", "lens": "7ARTISANS 25MM F/1.8", "shutter_speed": "1/100", "tag": "Cat"}'></div>
            </div>
            
            <div class="photo-container">
                <img src="/photos/DSC12333.webp" alt="DSC12333.webp" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/1.8", "camera": "SONY NEX-5T", "date": "April 7th, 2025 (14:25)", "focal_length": "25mm", "iso": "800", "lens": "7ARTISANS 25MM F/1.8", "shutter_speed": "1/100", "tag": "CAT"}'></div>
            </div>
            
        </div>
    </main>
    
    <footer>
    </footer>

    <script src="/js/masonry.js"></script>
    <script src="/js/lightbox.js"></script>
</body>
</html>
