<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/gallery.css">
    <link rel="stylesheet" href="/css/lightbox.css">
</head>
<body>    
    <header>
        <h1 class="site-title">AARON MURNIADI</h1>
    </header>
    
    <main>
        <div class="content">
            <h1 id="photo-gallery">Photo Gallery</h1>
<p>My photography collection with detailed metadata.</p>
<p>Each photo includes technical specifications and additional information stored in YAML files.</p>
        </div>
        <div class="gallery">
            
            <div class="photo-container">
                <img src="/photos/DSC00125.jpg" alt="DSC00125.jpg" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/8.0", "camera": "CANON EOS 5D MARK IV", "date": "22 JUL 2024 11:47PM", "focal_length": "35mm", "iso": "100", "lens": "SIGMA 35MM F/1.4 ART", "shutter_speed": "1/250s", "tag": "NATURE"}'></div>
            </div>
            
            <div class="photo-container">
                <img src="/photos/DSC00094.JPG" alt="DSC00094.JPG" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/1.8", "camera": "SONY A7III", "date": "14 AUG 2024 11:47PM", "focal_length": "25mm", "iso": "6400", "lens": "7ARTISANS 25MM F/1.8", "shutter_speed": "1/60s", "tag": "PORTRAIT"}'></div>
            </div>
            
            <div class="photo-container">
                <img src="/photos/DSC00091.JPG" alt="DSC00091.JPG" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/1.8", "camera": "SONY NEX-5T", "color_profile": "Black \u0026 White", "copyright": "\u00a9 Aaron Murniadi", "date": "APR 19, 2025 11:59 PM", "focal_length": "25mm", "iso": "3200", "lens": "7ARTISANS 25MM F/1.8", "location": "Home Studio", "notes": "One of my favorite cat portraits", "rating": "5 stars", "shutter_speed": "1/80s", "subject": "White Cat", "tag": "CAT"}'></div>
            </div>
            
            <div class="photo-container">
                <img src="/photos/DSC12333.webp" alt="DSC12333.webp" class="gallery-photo">
                <div class="metadata-container" style="display: none;" data-metadata='{"aperture": "f/5.6", "camera": "CANON EOS 5D MARK IV", "date": "14 DEC 2024 11:47PM", "focal_length": "50mm", "iso": "6400", "lens": "CANON 50MM F/1.4", "shutter_speed": "1/250s", "tag": "LANDSCAPE"}'></div>
            </div>
            
        </div>
    </main>
    
    <footer>
    </footer>

    <script src="/js/masonry.js"></script>
    <script src="/js/lightbox.js"></script>
</body>
</html>
